<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scene Negotiation</title>
<style>
:root{
  --bg:#111;
  --panel:#1a1a1a;
  --field:#222;
  --border:#3c3c3c;
  --text:#eee;
  --muted:#aaa;
  --accent:#7c3aed;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
body{padding:10px;line-height:1.15}
h1{margin:0 0 8px;font-size:18px}
.top{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.field{display:flex;flex-direction:column;gap:4px;min-width:0}
.field span,.mini-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
input[type="text"],input[type="date"],select,textarea{
  width:100%;background:var(--field);color:var(--text);
  border:1px solid var(--border);border-radius:7px;padding:7px 8px;font-size:14px
}
textarea{min-height:84px;resize:vertical}
details{background:var(--panel);border:1px solid #242424;border-radius:10px;margin:0 0 8px;overflow:hidden}
summary{list-style:none;cursor:pointer;padding:10px 11px;font-size:14px;font-weight:700;border-bottom:1px solid transparent}
summary::-webkit-details-marker{display:none}
details[open] summary{border-bottom-color:#2b2b2b}
.section{padding:8px}
.checkbox-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 10px}
.check{display:grid;grid-template-columns:18px 1fr;column-gap:8px;align-items:start;font-size:13px;min-width:0;line-height:1.08}
.check input[type="checkbox"]{width:16px;height:16px;margin:0;accent-color:var(--accent);transform:translateY(1px)}
.check span{display:block;word-break:break-word}
.touch-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.touch-card{background:#171717;border:1px solid #262626;border-radius:8px;padding:7px}
.touch-card .name{font-size:12px;margin:0 0 5px}
.sense-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
.sense-check{display:grid;grid-template-columns:16px 1fr;gap:6px;align-items:start;font-size:12px}
.sense-check input{width:14px;height:14px;margin:0;accent-color:var(--accent)}
.subhead{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:0 0 6px}
.rule{height:1px;background:#313131;margin:8px 0}
.btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px}
button{border:0;border-radius:8px;background:var(--accent);color:#fff;padding:11px 8px;font-size:14px;font-weight:600}
.output{margin-top:8px;background:var(--panel);border:1px solid #242424;border-radius:10px;padding:10px;white-space:pre-wrap;font-size:12px;line-height:1.28}
@media (max-width:560px){
  .btns{grid-template-columns:1fr 1fr}
  .btns button:last-child{grid-column:1/-1}
}
</style>
</head>
<body>

<h1>Scene Negotiation</h1>

<div class="top">
  <label class="field">
    <span>Date</span>
    <input id="sceneDate" type="date">
  </label>
  <label class="field">
    <span>Your name</span>
    <input id="yourName" type="text">
  </label>
  <label class="field">
    <span>Partner name</span>
    <input id="partnerName" type="text">
  </label>
  <label class="field">
    <span>Role</span>
    <select id="role">
      <option>Rigger</option>
      <option>Model</option>
    </select>
  </label>
</div>

<div class="top">
  <label class="field">
    <span>Safeword</span>
    <input id="safeword" type="text">
  </label>
  <div></div>
</div>


<details open>
  <summary>Rope Placement</summary>
  <div class="section">
    <div class="checkbox-grid">
      <label class="check"><input type="checkbox" id="ropeChest"><span>Chest</span></label>
      <label class="check"><input type="checkbox" id="ropeHips"><span>Hips</span></label>
      <label class="check"><input type="checkbox" id="ropeLegs"><span>Legs</span></label>
      <label class="check"><input type="checkbox" id="ropeArms"><span>Arms</span></label>
      <label class="check"><input type="checkbox" id="ropeHands"><span>Hands</span></label>
      <label class="check"><input type="checkbox" id="ropeWrists"><span>Wrists</span></label>
      <label class="check"><input type="checkbox" id="ropeFeet"><span>Feet</span></label>
      <label class="check"><input type="checkbox" id="ropeNeck"><span>Neck</span></label>
      <label class="check"><input type="checkbox" id="ropeFace"><span>Face</span></label>
      <label class="check"><input type="checkbox" id="ropeCrotch"><span>Crotch rope</span></label>
    </div>

    <div class="rule"></div>

    <div class="checkbox-grid">
      <label class="check"><input type="checkbox" id="ropePartial"><span>Partial suspension</span></label>
      <label class="check"><input type="checkbox" id="ropeFull"><span>Full suspension</span></label>
      <label class="check"><input type="checkbox" id="ropeUplines"><span>Positional uplines</span></label>
    </div>
  </div>
</details>


<details>
  <summary>Rope Style</summary>
  <div class="section">
    <div class="checkbox-grid">
      <label class="check"><input type="checkbox" id="styleSomatic"><span>Somatic rope</span></label>
      <label class="check"><input type="checkbox" id="styleLab"><span>Labbing / technical</span></label>
      <label class="check"><input type="checkbox" id="styleTorment"><span>Torment rope (semenawa)</span></label>
      <label class="check"><input type="checkbox" id="styleCaress"><span>Caress rope (aibunawa)</span></label>
      <label class="check"><input type="checkbox" id="styleAesthetic"><span>Rope aesthetics</span></label>
    </div>
  </div>
</details>

<details>
  <summary>Rope Marks</summary>
  <div class="section">
    <label class="field" style="margin-bottom:8px">
      <span>Mark tolerance</span>
      <select id="ropeMarks">
        <option>None</option>
        <option>Light temporary</option>
        <option>Visible hours</option>
        <option>Bruising OK</option>
      </select>
    </label>
    <div class="checkbox-grid">
      <label class="check"><input type="checkbox" id="markChest"><span>Chest</span></label>
      <label class="check"><input type="checkbox" id="markHips"><span>Hips</span></label>
      <label class="check"><input type="checkbox" id="markLegs"><span>Legs</span></label>
      <label class="check"><input type="checkbox" id="markArms"><span>Arms</span></label>
      <label class="check"><input type="checkbox" id="markHands"><span>Hands</span></label>
      <label class="check"><input type="checkbox" id="markWrists"><span>Wrists</span></label>
      <label class="check"><input type="checkbox" id="markFeet"><span>Feet</span></label>
      <label class="check"><input type="checkbox" id="markNeck"><span>Neck</span></label>
      <label class="check"><input type="checkbox" id="markFace"><span>Face</span></label>
      <label class="check"><input type="checkbox" id="markCrotch"><span>Crotch</span></label>
      <label class="check"><input type="checkbox" id="markBack"><span>Back</span></label>
      <label class="check"><input type="checkbox" id="markShoulders"><span>Shoulders</span></label>
    </div>
  </div>
</details>

<details>
  <summary>Touch</summary>
  <div class="section">
    <div class="touch-grid">
      <div class="touch-card">
        <div class="name">Back</div>
        <select id="touchBack"><option>None</option><option>Yes</option><option>Body manipulation only</option></select>
        <div class="sense-row">
          <label class="sense-check"><input type="checkbox" id="touchBackLight"><span>Light sensation</span></label>
          <label class="sense-check"><input type="checkbox" id="touchBackFirm"><span>Firm sensation</span></label>
        </div>
      </div>
      <div class="touch-card">
        <div class="name">Arms</div>
        <select id="touchArms"><option>None</option><option>Yes</option><option>Body manipulation only</option></select>
        <div class="sense-row">
          <label class="sense-check"><input type="checkbox" id="touchArmsLight"><span>Light sensation</span></label>
          <label class="sense-check"><input type="checkbox" id="touchArmsFirm"><span>Firm sensation</span></label>
        </div>
      </div>
      <div class="touch-card">
        <div class="name">Legs</div>
        <select id="touchLegs"><option>None</option><option>Yes</option><option>Body manipulation only</option></select>
        <div class="sense-row">
          <label class="sense-check"><input type="checkbox" id="touchLegsLight"><span>Light sensation</span></label>
          <label class="sense-check"><input type="checkbox" id="touchLegsFirm"><span>Firm sensation</span></label>
        </div>
      </div>
      <div class="touch-card">
        <div class="name">Hair</div>
        <select id="touchHair"><option>None</option><option>Yes</option><option>Body manipulation only</option></select>
        <div class="sense-row">
          <label class="sense-check"><input type="checkbox" id="touchHairLight"><span>Light sensation</span></label>
          <label class="sense-check"><input type="checkbox" id="touchHairFirm"><span>Firm sensation</span></label>
        </div>
      </div>
      <div class="touch-card">
        <div class="name">Face</div>
        <select id="touchFace"><option>None</option><option>Yes</option><option>Body manipulation only</option></select>
        <div class="sense-row">
          <label class="sense-check"><input type="checkbox" id="touchFaceLight"><span>Light sensation</span></label>
          <label class="sense-check"><input type="checkbox" id="touchFaceFirm"><span>Firm sensation</span></label>
        </div>
      </div>
      <div class="touch-card">
        <div class="name">Shoulders</div>
        <select id="touchShoulders"><option>None</option><option>Yes</option><option>Body manipulation only</option></select>
        <div class="sense-row">
          <label class="sense-check"><input type="checkbox" id="touchShouldersLight"><span>Light sensation</span></label>
          <label class="sense-check"><input type="checkbox" id="touchShouldersFirm"><span>Firm sensation</span></label>
        </div>
      </div>
      <div class="touch-card">
        <div class="name">Crotch</div>
        <select id="touchCrotch"><option>None</option><option>Yes</option><option>Body manipulation only</option></select>
        <div class="sense-row">
          <label class="sense-check"><input type="checkbox" id="touchCrotchLight"><span>Light sensation</span></label>
          <label class="sense-check"><input type="checkbox" id="touchCrotchFirm"><span>Firm sensation</span></label>
        </div>
      </div>
      <div class="touch-card">
        <div class="name">Bottom</div>
        <select id="touchBottom"><option>None</option><option>Yes</option><option>Body manipulation only</option></select>
        <div class="sense-row">
          <label class="sense-check"><input type="checkbox" id="touchBottomLight"><span>Light sensation</span></label>
          <label class="sense-check"><input type="checkbox" id="touchBottomFirm"><span>Firm sensation</span></label>
        </div>
      </div>
    </div>
  </div>
</details>

<details>
  <summary>Kiss / Lick / Bite</summary>
  <div class="section">
    <div class="subhead">Kiss</div>
    <div class="checkbox-grid">
      <label class="check"><input type="checkbox" id="kissMouth"><span>Mouth</span></label>
      <label class="check"><input type="checkbox" id="kissNeck"><span>Neck</span></label>
      <label class="check"><input type="checkbox" id="kissChest"><span>Chest</span></label>
      <label class="check"><input type="checkbox" id="kissShoulders"><span>Shoulders</span></label>
      <label class="check"><input type="checkbox" id="kissBack"><span>Back</span></label>
      <label class="check"><input type="checkbox" id="kissLegs"><span>Legs</span></label>
      <label class="check"><input type="checkbox" id="kissCrotch"><span>Crotch</span></label>
      <label class="check"><input type="checkbox" id="kissBottom"><span>Bottom</span></label>
    </div>
    <div class="rule"></div>
    <div class="subhead">Lick</div>
    <div class="checkbox-grid">
      <label class="check"><input type="checkbox" id="lickMouth"><span>Mouth</span></label>
      <label class="check"><input type="checkbox" id="lickNeck"><span>Neck</span></label>
      <label class="check"><input type="checkbox" id="lickChest"><span>Chest</span></label>
      <label class="check"><input type="checkbox" id="lickShoulders"><span>Shoulders</span></label>
      <label class="check"><input type="checkbox" id="lickBack"><span>Back</span></label>
      <label class="check"><input type="checkbox" id="lickLegs"><span>Legs</span></label>
      <label class="check"><input type="checkbox" id="lickCrotch"><span>Crotch</span></label>
      <label class="check"><input type="checkbox" id="lickBottom"><span>Bottom</span></label>
    </div>
    <div class="rule"></div>
    <div class="subhead">Bite</div>
    <div class="checkbox-grid">
      <label class="check"><input type="checkbox" id="biteMouth"><span>Mouth</span></label>
      <label class="check"><input type="checkbox" id="biteNeck"><span>Neck</span></label>
      <label class="check"><input type="checkbox" id="biteChest"><span>Chest</span></label>
      <label class="check"><input type="checkbox" id="biteShoulders"><span>Shoulders</span></label>
      <label class="check"><input type="checkbox" id="biteBack"><span>Back</span></label>
      <label class="check"><input type="checkbox" id="biteLegs"><span>Legs</span></label>
      <label class="check"><input type="checkbox" id="biteCrotch"><span>Crotch</span></label>
      <label class="check"><input type="checkbox" id="biteBottom"><span>Bottom</span></label>
    </div>
    <div class="rule"></div>
    <div class="subhead">Proximity</div>
    <div class="checkbox-grid">
      <label class="check"><input type="checkbox" id="proximityClose"><span>Close breath / proximity</span></label>
      <label class="check"><input type="checkbox" id="lipBrush"><span>Lip brush</span></label>
    </div>
  </div>
</details>

<details>
  <summary>Impact</summary>
  <div class="section">
    <div class="subhead">Locations</div>
    <div class="checkbox-grid">
      <label class="check"><input type="checkbox" id="impactButt"><span>Butt</span></label>
      <label class="check"><input type="checkbox" id="impactThighs"><span>Thighs</span></label>

      <label class="check"><input type="checkbox" id="impactShoulders"><span>Shoulders</span></label>
      <label class="check"><input type="checkbox" id="impactChest"><span>Chest</span></label>
      <label class="check"><input type="checkbox" id="impactGroin"><span>Groin</span></label>
    </div>
    <div class="rule"></div>
    <div class="subhead">Implements</div>
    <div class="checkbox-grid">
      <label class="check"><input type="checkbox" id="impactHand"><span>Hand</span></label>
      <label class="check"><input type="checkbox" id="impactPaddle"><span>Paddle</span></label>
      <label class="check"><input type="checkbox" id="impactFlogger"><span>Flogger</span></label>
      <label class="check"><input type="checkbox" id="impactCrop"><span>Crop</span></label>
      <label class="check"><input type="checkbox" id="impactRope"><span>Rope</span></label>
    </div>
  </div>
</details>

<details>
  <summary>Bunny Positions</summary>
  <div class="section">
    <div class="checkbox-grid">
      <label class="check"><input type="checkbox" id="bunnySeiza"><span>Seiza</span></label>
      <label class="check"><input type="checkbox" id="bunnySideSitting"><span>Side sitting</span></label>
      <label class="check"><input type="checkbox" id="bunnyNadu"><span>Nadu</span></label>
      <label class="check"><input type="checkbox" id="bunnyKneel"><span>Kneeling</span></label>
      <label class="check"><input type="checkbox" id="bunnySit"><span>Sitting</span></label>
      <label class="check"><input type="checkbox" id="bunnyStand"><span>Standing</span></label>
      <label class="check"><input type="checkbox" id="bunnyFloor"><span>Lying down</span></label>
      <label class="check"><input type="checkbox" id="bunnyChair"><span>Chair</span></label>
      <label class="check"><input type="checkbox" id="bunnyTable"><span>Table</span></label>
    </div>
  </div>
</details>

<details>
  <summary>Top Position</summary>
  <div class="section">
    <div class="subhead">Directional position</div>
    <div class="checkbox-grid">
      <label class="check"><input type="checkbox" id="topFront"><span>In front</span></label>
      <label class="check"><input type="checkbox" id="topBehind"><span>Behind</span></label>
      <label class="check"><input type="checkbox" id="topSide"><span>Side</span></label>
      <label class="check"><input type="checkbox" id="topAbove"><span>Above / on top</span></label>
      <label class="check"><input type="checkbox" id="topUnder"><span>Under</span></label>
    </div>
    <div class="rule"></div>
    <div class="subhead">Distance</div>
    <div class="checkbox-grid">
      <label class="check"><input type="checkbox" id="distClose"><span>Very close</span></label>
      <label class="check"><input type="checkbox" id="distMid"><span>Moderate distance</span></label>
      <label class="check"><input type="checkbox" id="distFar"><span>Distant</span></label>
    </div>
  </div>
</details>

<details>
  <summary>Talking</summary>
  <div class="section">
    <div class="checkbox-grid">
      <label class="check"><input type="checkbox" id="talkConversation"><span>Conversational</span></label>
      <label class="check"><input type="checkbox" id="talkMinimal"><span>Minimal</span></label>
      <label class="check"><input type="checkbox" id="talkInstructional"><span>Instructional</span></label>

</details>

<details>
  <summary>Power Dynamics</summary>
  <div class="section">
    <label class="field" style="margin-bottom:8px">
      <span>Intensity</span>
      <select id="dynamicIntensity">
        <option>Light</option>
        <option>Strict</option>
        <option>Total</option>
      </select>
    </label>
    <div class="checkbox-grid">
      <label class="check"><input type="checkbox" id="dynServiceTop"><span>Service (top)</span></label>
      <label class="check"><input type="checkbox" id="dynServiceBottom"><span>Service (bottom)</span></label>
      <label class="check"><input type="checkbox" id="dynOwnership"><span>Ownership</span></label>
      <label class="check"><input type="checkbox" id="dynToy"><span>Toy</span></label>
      <label class="check"><input type="checkbox" id="dynNurturing"><span>Nurturing</span></label>
      <label class="check"><input type="checkbox" id="dynBrat"><span>Brat / brat tamer</span></label>

</details>

<details>
  <summary>Aftercare</summary>
  <div class="section">
    <div class="checkbox-grid">
      <label class="check"><input type="checkbox" id="afterHug"><span>Hugs</span></label>
      <label class="check"><input type="checkbox" id="afterCuddle"><span>Cuddles</span></label>

      <label class="check"><input type="checkbox" id="afterTalk"><span>Talking</span></label>

      <label class="check"><input type="checkbox" id="afterNextCheck"><span>Next-day check-in</span></label>

    </div>

</details>

<details>
  <summary>Notes</summary>
  <div class="section">
    <textarea id="notes"></textarea>
  </div>
</details>

<div class="btns" style="grid-template-columns:1fr 1fr">
  <button onclick="shareSummary()">Share Summary</button>
  <button onclick="shareLink()">Save / Share Preset</button>
</div>

<div id="status" class="output" style="padding:8px;font-size:12px;color:#aaa">Ready.</div>

<script>
function g(id){ return document.getElementById(id); }

const checkboxIds = Array.from(document.querySelectorAll('input[type="checkbox"]')).map(el => el.id);
const textIds = Array.from(document.querySelectorAll('input[type="text"], input[type="date"], textarea')).map(el => el.id);
const selectIds = Array.from(document.querySelectorAll('select')).map(el => el.id);

function currentDateString(){
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${yyyy}-${mm}-${dd}`;
}

function setDefaultDate(){
  if (!g('sceneDate').value) g('sceneDate').value = currentDateString();
}

function defaultState(){
  const d = {};
  checkboxIds.forEach(id => d[id] = false);
  textIds.forEach(id => d[id] = '');
  selectIds.forEach(id => d[id] = g(id).options[0].value);
  d.sceneDate = currentDateString();
  return d;
}

function applyStateFromUrl(){
  const p = new URLSearchParams(location.search);
  p.forEach((v,k) => {
    const el = g(k);
    if (!el) return;
    if (el.type === 'checkbox') el.checked = (v === 'true');
    else el.value = v;
  });
}

function checkedList(ids, labels){
  const out = [];
  ids.forEach((id, i) => { if (g(id).checked) out.push(labels[i]); });
  return out.length ? out.join(', ') : 'None';
}

function touchLine(area, base){
  const mode = g(base).value;
  const extras = [];
  if (g(base + 'Light').checked) extras.push('light sensation');
  if (g(base + 'Firm').checked) extras.push('firm sensation');
  const extraText = extras.length ? ' + ' + extras.join(' + ') : '';
  return `${area}: ${mode}${extraText}`;
}


function setStatus(msg){
  const el = g('status');
  if (el) el.textContent = msg;
}

function generateSummary(){
  return `SCENE NEGOTIATION

Date: ${g('sceneDate').value}
You: ${g('yourName').value || '—'}
Partner: ${g('partnerName').value || '—'}
Role: ${g('role').value}
Safeword: ${g('safeword').value || '—'}

ROPE PLACEMENT
${checkedList(
  ['ropeChest','ropeHips','ropeLegs','ropeArms','ropeHands','ropeWrists','ropeFeet','ropeNeck','ropeFace','ropeCrotch'],
  ['Chest','Hips','Legs','Arms','Hands','Wrists','Feet','Neck','Face','Crotch rope']
)}

SUSPENSION / UPLINES
${checkedList(
  ['ropePartial','ropeFull','ropeUplines'],
  ['Partial suspension','Full suspension','Positional uplines']
)}

ROPE STYLE
${checkedList(
  ['styleSomatic','styleLab','styleTorment','styleCaress','styleAesthetic'],
  ['Somatic rope','Labbing / technical','Torment rope (semenawa)','Caress rope (aibunawa)','Rope aesthetics']
)}

ROPE MARKS
Tolerance: ${g('ropeMarks').value}
Areas: ${checkedList(
  ['markChest','markHips','markLegs','markArms','markHands','markWrists','markFeet','markNeck','markFace','markCrotch','markBack','markShoulders'],
  ['Chest','Hips','Legs','Arms','Hands','Wrists','Feet','Neck','Face','Crotch','Back','Shoulders']
)}

TOUCH
${touchLine('Back','touchBack')}
${touchLine('Arms','touchArms')}
${touchLine('Legs','touchLegs')}
${touchLine('Hair','touchHair')}
${touchLine('Face','touchFace')}
${touchLine('Shoulders','touchShoulders')}
${touchLine('Crotch','touchCrotch')}
${touchLine('Bottom','touchBottom')}

async function copyTextRobust(text){
  if (navigator.clipboard && window.isSecureContext) {
    await navigator.clipboard.writeText(text);
    return true;
  }
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.setAttribute('readonly', '');
  ta.style.position = 'fixed';
  ta.style.top = '-9999px';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  let ok = false;
  try {
    ok = document.execCommand('copy');
  } catch(e) {
    ok = false;
  }
  document.body.removeChild(ta);
  if (!ok) throw new Error('copy failed');
  return true;
}

async function shareSummary(){
  try{
    const txt = generateSummary();
    if (navigator.share) {
      await navigator.share({
        title: 'Scene negotiation summary',
        text: txt
      });
      setStatus('Summary shared.');
      return;
    }
    await copyTextRobust(txt);
    setStatus('Share sheet unavailable — summary copied.');
  }catch(e){
    if (e && e.name === 'AbortError'){
      setStatus('Share cancelled.');
      return;
    }
    setStatus('Could not share summary automatically.');
  }
}

function buildShareUrl(){
  const defaults = defaultState();
  const p = new URLSearchParams();

  checkboxIds.forEach(id => {
    if (g(id).checked !== defaults[id]) p.set(id, 'true');
  });

  textIds.forEach(id => {
    const val = g(id).value;
    if (val !== defaults[id] && val !== '') p.set(id, val);
  });

  selectIds.forEach(id => {
    const val = g(id).value;
    if (val !== defaults[id]) p.set(id, val);
  });

  const base = location.origin + location.pathname;
  return p.toString() ? (base + '?' + p.toString()) : base;
}

async function shareLink(){
  const url = buildShareUrl();
  try{
    if (navigator.share) {
      await navigator.share({
        title: 'Scene negotiation',
        text: 'Scene negotiation link',
        url
      });
      setStatus('Shared.');
      return;
    }
  }catch(e){
    if (e && e.name === 'AbortError'){
      setStatus('Share cancelled.');
      return;
    }
  }

  try{
    await copyTextRobust(url);
    setStatus('Link copied.');
  }catch(e){
    setStatus('Could not copy link automatically. Try opening this over http(s) or use a supported browser.');
  }
}
